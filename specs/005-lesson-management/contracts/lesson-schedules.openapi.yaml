openapi: 3.1.0
info:
  title: D-01 Lesson Schedule Management Mock API
  version: 0.1.0
  description: Phase 1 mock API contract for the D-01 Reservation Management list screen.
servers:
  - url: /api
paths:
  /crm/lesson-schedules/summary:
    get:
      summary: Get schedule KPI summary
      operationId: getCrmLessonSchedulesSummary
      tags: [LessonSchedules]
      parameters:
        - $ref: "#/components/parameters/Axis"
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/Date"
      responses:
        "200":
          description: KPI summary for the selected context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonScheduleSummaryResponse"
  /crm/lesson-schedules/stores/summary:
    get:
      summary: Get all-store schedule summary
      operationId: getCrmLessonScheduleStoresSummary
      tags: [LessonSchedules]
      parameters:
        - $ref: "#/components/parameters/Date"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortOrder"
      responses:
        "200":
          description: Area-level KPI and store summary rows.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSchedulesSummaryResponse"
  /crm/lesson-schedules:
    get:
      summary: Get lesson schedules for timeline, calendar, or list views
      operationId: getCrmLessonSchedules
      tags: [LessonSchedules]
      parameters:
        - $ref: "#/components/parameters/Axis"
        - $ref: "#/components/parameters/ViewMode"
        - $ref: "#/components/parameters/Date"
        - $ref: "#/components/parameters/WeekStart"
        - $ref: "#/components/parameters/StoreId"
        - $ref: "#/components/parameters/Studio"
        - $ref: "#/components/parameters/InstructorId"
        - $ref: "#/components/parameters/SortBy"
        - $ref: "#/components/parameters/SortOrder"
      responses:
        "200":
          description: Filtered and sorted schedules.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonSchedulesResponse"
  /crm/lesson-schedules/{id}/change:
    patch:
      summary: Complete Phase 1 schedule change modal flow
      operationId: patchCrmLessonScheduleChange
      tags: [LessonSchedules]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleChangeRequest"
      responses:
        "200":
          description: Schedule change flow completed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScheduleChangeResponse"
        "404":
          description: Schedule not found.
components:
  parameters:
    Axis:
      name: axis
      in: query
      schema:
        type: string
        enum: [store, my_schedule]
        default: store
    ViewMode:
      name: view_mode
      in: query
      schema:
        type: string
        enum: [day, week, list]
        default: day
    Date:
      name: date
      in: query
      schema:
        type: string
        format: date
    WeekStart:
      name: week_start
      in: query
      schema:
        type: string
        format: date
    StoreId:
      name: store_id
      in: query
      schema:
        type: string
        default: all
    Studio:
      name: studio
      in: query
      schema:
        type: string
        default: all
    InstructorId:
      name: instructor_id
      in: query
      schema:
        type: string
        default: all
    SortBy:
      name: sort_by
      in: query
      schema:
        type: string
        enum:
          - store_name
          - lesson_count_today
          - average_booking_rate
          - assigned_staff_count
          - alert_count
          - in_progress_label
          - date
          - time
          - name
          - type
          - instructor_name
          - booked_count
          - alert_label
          - is_public
    SortOrder:
      name: sort_order
      in: query
      schema:
        type: string
        enum: [asc, desc]
  schemas:
    LessonType:
      type: string
      enum: [studio, personal]
    LessonStatus:
      type: string
      enum: [upcoming, in_progress, completed]
    PaymentType:
      type: string
      enum: [monthly_plan, one_time_30, one_time_60]
    LessonSchedule:
      type: object
      required:
        - id
        - store_id
        - store_name
        - date
        - start_time
        - end_time
        - name
        - location
        - instructor_id
        - instructor_name
        - booked_count
        - capacity
        - type
        - status
        - is_public
      properties:
        id:
          type: string
        store_id:
          type: string
        store_name:
          type: string
        date:
          type: string
          format: date
        start_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
        end_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
        name:
          type: string
        location:
          type: string
        instructor_id:
          type: string
        instructor_name:
          type: string
        booked_count:
          type: integer
          minimum: 0
        capacity:
          type: integer
          minimum: 1
        type:
          $ref: "#/components/schemas/LessonType"
        status:
          $ref: "#/components/schemas/LessonStatus"
        alert_label:
          type: string
          nullable: true
        is_public:
          type: boolean
        payment_type:
          allOf:
            - $ref: "#/components/schemas/PaymentType"
          nullable: true
        booked_member_names:
          type: array
          items:
            type: string
    LessonScheduleKpiSummary:
      type: object
      required:
        - lesson_count_today
        - studio_lesson_count_today
        - personal_session_count_today
        - booking_occupancy_rate
        - booking_occupancy_delta
        - change_count_today
        - cancellation_count_today
        - time_change_count_today
        - instructor_change_count_today
        - assigned_staff_count_today
        - assigned_instructor_count_today
        - assigned_trainer_count_today
      properties:
        lesson_count_today:
          type: integer
          minimum: 0
        studio_lesson_count_today:
          type: integer
          minimum: 0
        personal_session_count_today:
          type: integer
          minimum: 0
        booking_occupancy_rate:
          type: integer
          minimum: 0
          maximum: 100
        booking_occupancy_delta:
          type: integer
        change_count_today:
          type: integer
          minimum: 0
        cancellation_count_today:
          type: integer
          minimum: 0
        time_change_count_today:
          type: integer
          minimum: 0
        instructor_change_count_today:
          type: integer
          minimum: 0
        assigned_staff_count_today:
          type: integer
          minimum: 0
        assigned_instructor_count_today:
          type: integer
          minimum: 0
        assigned_trainer_count_today:
          type: integer
          minimum: 0
    AreaScheduleKpiSummary:
      type: object
      required:
        - managed_store_count
        - required_action_alert_count
        - abnormal_store_count
      properties:
        managed_store_count:
          type: integer
          minimum: 0
        required_action_alert_count:
          type: integer
          minimum: 0
        abnormal_store_count:
          type: integer
          minimum: 0
    StoreScheduleSummary:
      type: object
      required:
        - store_id
        - store_name
        - lesson_count_today
        - average_booking_rate
        - assigned_staff_count
        - alert_count
        - in_progress_label
      properties:
        store_id:
          type: string
        store_name:
          type: string
        lesson_count_today:
          type: integer
          minimum: 0
        average_booking_rate:
          type: integer
          minimum: 0
          maximum: 100
        assigned_staff_count:
          type: integer
          minimum: 0
        alert_count:
          type: integer
          minimum: 0
        in_progress_label:
          type: string
    LessonScheduleSummaryResponse:
      type: object
      required: [summary]
      properties:
        summary:
          $ref: "#/components/schemas/LessonScheduleKpiSummary"
    StoreSchedulesSummaryResponse:
      type: object
      required: [area_summary, stores]
      properties:
        area_summary:
          $ref: "#/components/schemas/AreaScheduleKpiSummary"
        stores:
          type: array
          items:
            $ref: "#/components/schemas/StoreScheduleSummary"
    LessonSchedulesResponse:
      type: object
      required: [schedules]
      properties:
        schedules:
          type: array
          items:
            $ref: "#/components/schemas/LessonSchedule"
    ScheduleChangeRequest:
      type: object
      required:
        - change_scope
        - start_time
        - end_time
        - instructor_id
        - studio_id
        - reason
        - send_notification
      properties:
        change_scope:
          type: string
          enum: [this_only, all_after]
        start_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
        end_time:
          type: string
          pattern: "^\\d{2}:\\d{2}$"
        instructor_id:
          type: string
        studio_id:
          type: string
        reason:
          type: string
        send_notification:
          type: boolean
    ScheduleChangeResponse:
      type: object
      required: [success, schedule_id]
      properties:
        success:
          type: boolean
        schedule_id:
          type: string
