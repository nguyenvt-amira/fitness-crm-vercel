openapi: 3.0.3
info:
  title: CRM Training Equipment Mock API
  version: 1.0.0
  description: Phase 1 mock API contract for E-03 Training Equipment Management.
servers:
  - url: /api/crm
paths:
  /training-equipment:
    get:
      summary: List training equipment
      parameters:
        - in: query
          name: storeId
          schema: { type: string }
        - in: query
          name: keyword
          schema: { type: string }
        - in: query
          name: toolType
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string, description: "installed|maintenance|removed|discarded|exclude_discarded|all" }
        - in: query
          name: page
          schema: { type: integer, minimum: 1, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, enum: [25, 50, 100, 200], default: 50 }
        - in: query
          name: sortBy
          schema: { type: string }
        - in: query
          name: sortOrder
          schema: { type: string, enum: [asc, desc] }
      responses:
        '200':
          description: Equipment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/TrainingEquipment' }
                  total: { type: integer }
                  page: { type: integer }
                  pageSize: { type: integer }
    post:
      summary: Create equipment
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TrainingEquipmentCreateInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TrainingEquipment' }
        '400': { description: Validation error }
        '403': { description: Forbidden }

  /training-equipment/{equipmentId}:
    get:
      summary: Get equipment detail
      parameters:
        - in: path
          name: equipmentId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Detail data
          content:
            application/json:
              schema:
                type: object
                properties:
                  equipment: { $ref: '#/components/schemas/TrainingEquipment' }
                  linkedExercises:
                    type: array
                    items: { $ref: '#/components/schemas/ExerciseLink' }
        '404': { description: Not found }
    patch:
      summary: Update equipment
      parameters:
        - in: path
          name: equipmentId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TrainingEquipmentUpdateInput' }
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TrainingEquipment' }
        '400': { description: Validation error }
        '403': { description: Forbidden }
        '404': { description: Not found }
    delete:
      summary: Soft delete equipment
      parameters:
        - in: path
          name: equipmentId
          required: true
          schema: { type: string }
      responses:
        '204': { description: Deleted }
        '400': { description: Cannot delete due to linked exercises }
        '403': { description: Forbidden }
        '404': { description: Not found }

  /training-equipment/{equipmentId}/status:
    patch:
      summary: Change equipment status
      parameters:
        - in: path
          name: equipmentId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StatusChangeRequest' }
      responses:
        '200':
          description: Status changed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TrainingEquipment' }
        '400': { description: Validation error (reason required) }
        '403': { description: Forbidden }
        '404': { description: Not found }

  /training-equipment/{equipmentId}/exercise-links:
    post:
      summary: Add exercise links
      parameters:
        - in: path
          name: equipmentId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [exerciseIds]
              properties:
                exerciseIds:
                  type: array
                  items: { type: string }
      responses:
        '200': { description: Links updated }
        '400': { description: Validation error }
        '403': { description: Forbidden }
        '404': { description: Not found }
    delete:
      summary: Remove one exercise link
      parameters:
        - in: path
          name: equipmentId
          required: true
          schema: { type: string }
        - in: query
          name: exerciseId
          required: true
          schema: { type: string }
      responses:
        '204': { description: Unlinked }
        '403': { description: Forbidden }
        '404': { description: Not found }

  /training-equipment/{equipmentId}/history:
    get:
      summary: Get seeded status history (read-only in Phase 1)
      parameters:
        - in: path
          name: equipmentId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: History records
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/HistoryEntry' }
        '404': { description: Not found }

components:
  schemas:
    TrainingEquipment:
      type: object
      required: [id, storeId, name, toolType, quantity, status, lastUpdatedAt, lastUpdatedBy]
      properties:
        id: { type: string }
        storeId: { type: string }
        storeName: { type: string }
        name: { type: string, maxLength: 255 }
        toolType: { type: string }
        quantity: { type: integer, minimum: 1 }
        installationArea: { type: string, nullable: true }
        manufacturer: { type: string, nullable: true }
        modelNumber: { type: string, nullable: true }
        installedOn: { type: string, format: date, nullable: true }
        status: { type: string, enum: [installed, maintenance, removed, discarded] }
        notes: { type: string, nullable: true, maxLength: 1000 }
        linkedExerciseCount: { type: integer, minimum: 0 }
        lastUpdatedAt: { type: string, format: date-time }
        lastUpdatedBy: { type: string }
    TrainingEquipmentCreateInput:
      type: object
      required: [storeId, name, toolType, quantity]
      properties:
        storeId: { type: string }
        name: { type: string, minLength: 1, maxLength: 255 }
        toolType: { type: string }
        quantity: { type: integer, minimum: 1 }
        installationArea: { type: string, nullable: true }
        manufacturer: { type: string, nullable: true }
        modelNumber: { type: string, nullable: true }
        installedOn: { type: string, format: date, nullable: true }
        status:
          type: string
          enum: [installed, maintenance, removed, discarded]
          default: installed
        notes: { type: string, nullable: true, maxLength: 1000 }
    TrainingEquipmentUpdateInput:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 255 }
        toolType: { type: string }
        quantity: { type: integer, minimum: 1 }
        installationArea: { type: string, nullable: true }
        manufacturer: { type: string, nullable: true }
        modelNumber: { type: string, nullable: true }
        installedOn: { type: string, format: date, nullable: true }
        notes: { type: string, nullable: true, maxLength: 1000 }
    StatusChangeRequest:
      type: object
      required: [nextStatus, reason]
      properties:
        nextStatus:
          type: string
          enum: [installed, maintenance, removed, discarded]
        reason:
          type: string
          minLength: 1
          maxLength: 1000
    ExerciseLink:
      type: object
      required: [equipmentId, exerciseId, exerciseName, exerciseToolType]
      properties:
        equipmentId: { type: string }
        exerciseId: { type: string }
        exerciseName: { type: string }
        exerciseToolType: { type: string }
        difficulty: { type: string, nullable: true }
        bodyPart: { type: string, nullable: true }
    HistoryEntry:
      type: object
      required: [id, equipmentId, changedAt, changedBy, fromStatus, toStatus, reason]
      properties:
        id: { type: string }
        equipmentId: { type: string }
        changedAt: { type: string, format: date-time }
        changedBy: { type: string }
        fromStatus: { type: string, enum: [installed, maintenance, removed, discarded] }
        toStatus: { type: string, enum: [installed, maintenance, removed, discarded] }
        reason: { type: string }
